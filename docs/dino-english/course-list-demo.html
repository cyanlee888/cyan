<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Dino English — Course List Page (simplified)</title>
<!-- Simplified course list page: one job only = the course directory of the current Level.
     Reuses DESIGN.md (forest classroom) + V1.3.0 map styling. Self-contained, no external assets. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --forest-deep:#143d2a; --forest-mid:#2d6b45; --forest-light:#a8e6cf; --forest-mist:#d4f8ec;
    --surface:#fffbf8; --surface-elevated:#fff; --ink:#1a2420; --ink-muted:#4a5f54;
    --accent-live:#ea6c25; --border:#c5ddd2;
    --gold:#ffd98a; --gold-soft:#ffe9bd; --gold-ink:#8a5a12;
    --done:#7bd6a0; --done-soft:rgba(123,214,160,0.18); --done-ink:#bff0d2;
    --font:"DM Sans",system-ui,sans-serif; --display:"Sora",system-ui,sans-serif;
    --r-md:18px; --r-pill:9999px; --ease:cubic-bezier(.22,1,.36,1);
    --device-w:852px; --device-h:393px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{min-height:100dvh;background:#1e1a24;font-family:var(--font);display:flex;flex-direction:column;align-items:center;padding:12px;color:var(--ink)}
  .demo-bar{width:min(var(--device-w),100%);margin-bottom:10px;font-size:.72rem;line-height:1.5;color:rgba(255,255,255,.7);text-align:center}
  .demo-bar b{color:#fff}
  .device-wrap{width:min(var(--device-w),calc(100vw - 24px))}
  .device{background:var(--surface);border-radius:26px;border:1px solid rgba(255,255,255,.1);box-shadow:0 26px 70px rgba(0,0,0,.5);overflow:hidden;position:relative;aspect-ratio:852/393;width:100%;max-height:calc(100dvh - 70px)}
  .screen{display:none;flex-direction:column;height:100%;position:absolute;inset:0;animation:in .32s var(--ease) both}
  .screen.active{display:flex}
  @keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* ============ Class home (simplified) ============ */
  .ch{background:radial-gradient(120% 120% at 80% -10%, var(--forest-mist) 0%, var(--surface) 55%)}
  .ch-top{display:flex;align-items:center;gap:10px;padding:14px 20px 4px}
  .ch-ava{width:38px;height:38px;border-radius:50%;background:#fff;border:2px solid var(--forest-light);display:grid;place-items:center;font-size:1.1rem;box-shadow:0 4px 10px rgba(0,0,0,.08)}
  .ch-hi{font-size:.8rem;color:var(--ink-muted)} .ch-hi b{color:var(--forest-deep);font-weight:700}
  .ch-body{flex:1;display:flex;gap:18px;padding:6px 22px 8px;min-height:0}
  .ch-teacher{flex:0 0 168px;background:linear-gradient(165deg,#1d5c8f,#2d6b45);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#fff;padding:14px;box-shadow:0 14px 28px rgba(20,61,42,.28)}
  .ch-teacher-face{width:76px;height:76px;border-radius:50%;background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.5);display:grid;place-items:center;font-size:2.2rem}
  .ch-teacher-name{font-family:var(--display);font-weight:700;font-size:1.05rem}
  .ch-teacher-sw{font-size:.66rem;font-weight:700;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:var(--r-pill);padding:5px 12px;cursor:pointer;font-family:var(--font)}
  .ch-main{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:0}
  .ch-kicker{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-live);margin-bottom:4px}
  .ch-title{font-family:var(--display);font-size:1.32rem;font-weight:600;color:var(--forest-deep);letter-spacing:-.02em;margin-bottom:12px}
  .ch-next{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;cursor:pointer;text-align:left;font-family:var(--font);box-shadow:0 12px 26px rgba(20,61,42,.12);transition:transform .12s var(--ease),box-shadow .15s}
  .ch-next:hover{transform:translateY(-2px);box-shadow:0 16px 30px rgba(20,61,42,.18)}
  .ch-next-thumb{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--forest-light),var(--forest-mist));display:grid;place-items:center;font-size:1.7rem;flex-shrink:0}
  .ch-next-info{flex:1;min-width:0}
  .ch-next-loc{display:block;font-size:.64rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-muted)}
  .ch-next-name{display:block;font-size:1rem;font-weight:800;color:var(--ink);margin:2px 0}
  .ch-next-meta{display:block;font-size:.72rem;color:var(--ink-muted)}
  .ch-next-go{flex-shrink:0;background:var(--forest-mid);color:#fff;border-radius:var(--r-pill);padding:11px 18px;font-size:.86rem;font-weight:700;display:inline-flex;align-items:center;gap:6px}
  .ch-more{margin-top:12px;align-self:flex-start;background:transparent;border:none;color:var(--forest-mid);font-family:var(--font);font-size:.9rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:6px 2px}
  .ch-more .chev{transition:transform .15s} .ch-more:hover .chev{transform:translateX(3px)}
  .ch-nav{flex-shrink:0;display:flex;background:var(--forest-deep);padding:6px 8px 8px}
  .ch-nav button{flex:1;background:none;border:none;color:rgba(255,255,255,.55);font-family:var(--font);font-size:.66rem;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer}
  .ch-nav button .ic{font-size:1.05rem}
  .ch-nav button.on{color:#fff}

  /* ============ Course List page — simplified directory ============ */
  .cl{padding:0}
  .cl-shell{position:absolute;inset:0;display:flex;flex-direction:column;background:linear-gradient(162deg,#143a5e 0%,#1d5c8f 52%,#2d6b45 132%)}
  .cl-head{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:13px 22px 8px}
  .cl-back{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);color:#fff;font-family:var(--font);font-size:.78rem;font-weight:700;border-radius:var(--r-pill);padding:7px 14px;cursor:pointer;flex-shrink:0}
  .cl-back:hover{background:rgba(255,255,255,.24)}
  .lev-switch{display:flex;align-items:center;gap:9px;margin:0 auto}
  .lev-arrow{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);color:#fff;font-size:1.15rem;line-height:1;cursor:pointer;display:grid;place-items:center;transition:background .15s;font-family:var(--font)}
  .lev-arrow:hover{background:rgba(255,255,255,.26)} .lev-arrow:disabled{opacity:.3;cursor:not-allowed}
  .lev-cur{text-align:center;color:#fff;min-width:132px}
  .lev-cur b{font-family:var(--display);font-size:1.04rem;font-weight:700;display:block;line-height:1.1}
  .lev-cur span{font-size:.6rem;color:rgba(255,255,255,.7)}
  .cl-prog{font-size:.7rem;font-weight:700;color:rgba(255,255,255,.85);background:rgba(255,255,255,.14);border-radius:var(--r-pill);padding:6px 12px;white-space:nowrap;flex-shrink:0}
  .cl-goal{flex-shrink:0;margin:2px 22px 9px;font-size:.74rem;font-weight:700;color:var(--done-ink);background:var(--done-soft);border:1px solid rgba(123,214,160,.4);border-radius:12px;padding:9px 13px;display:flex;gap:8px;align-items:center;line-height:1.35}
  .cl-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:0 22px 18px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.3) transparent}
  .cl-scroll::-webkit-scrollbar{width:6px} .cl-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:3px}
  .units{display:flex;flex-direction:column;gap:8px}
  .ucard{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);border-radius:14px;padding:11px 14px;cursor:pointer;transition:background .15s}
  .ucard:hover{background:rgba(255,255,255,.14)}
  .ucard.current{background:rgba(255,233,189,.13);border-color:rgba(255,217,138,.42)}
  .ucard.flash{animation:flash 1s var(--ease)}
  @keyframes flash{0%,100%{box-shadow:none}30%{box-shadow:0 0 0 3px var(--gold)}}
  .uc-top{display:flex;align-items:center;gap:11px}
  .uc-no{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:.72rem;font-weight:800;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.22);color:#fff;flex-shrink:0}
  .ucard.done .uc-no{background:var(--done);border-color:var(--done);color:#0c3a22}
  .ucard.current .uc-no{background:var(--gold);border-color:var(--gold);color:var(--gold-ink)}
  .uc-info{flex:1;min-width:0}
  .uc-theme{font-size:.82rem;font-weight:800;color:#fff;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .uc-goal{font-size:.66rem;color:rgba(255,255,255,.74);display:block;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .uc-status{font-size:.56rem;font-weight:800;border-radius:var(--r-pill);padding:3px 9px;white-space:nowrap;flex-shrink:0}
  .st-done{background:var(--done-soft);color:var(--done-ink)}
  .st-current{background:var(--gold-soft);color:var(--gold-ink)}
  .st-soon{background:rgba(255,255,255,.14);color:rgba(255,255,255,.85)}
  .st-far{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55)}
  .uc-chev{font-size:.66rem;color:rgba(255,255,255,.5);transition:transform .18s;flex-shrink:0;margin-left:4px}
  .ucard.open .uc-chev{transform:rotate(90deg)}
  .uc-lessons{margin-top:9px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.18);display:none;flex-direction:column;gap:6px}
  .ucard.open .uc-lessons{display:flex}
  .ul{font-size:.66rem;color:rgba(255,255,255,.84);display:flex;gap:8px;align-items:center}
  .ul i{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.14);display:grid;place-items:center;font-size:.5rem;font-style:normal;flex-shrink:0;color:#fff}
  .ul.done i{background:var(--done);color:#0c3a22}
  .ul.current i{background:var(--gold);color:var(--gold-ink)}
  .ul.lock{color:rgba(255,255,255,.5)}

  .toast{position:absolute;left:50%;bottom:16px;transform:translateX(-50%) translateY(20px);background:var(--forest-deep);color:#fff;font-size:.78rem;font-weight:600;padding:10px 18px;border-radius:var(--r-pill);opacity:0;pointer-events:none;transition:.3s var(--ease);z-index:20;box-shadow:0 10px 24px rgba(0,0,0,.3)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <p class="demo-bar"><b>Dino English · 课程列表页(简化版)</b> — 这一页只做一件事:看「当前 Level 的课程目录」。顶部 <b>‹ ›</b> 切 Level,一行是学完本阶能达到的目标,下面 12 个 Unit 点开看每节课(默认只展开正在学的)。点 <b>← Class</b> 回简化首页。</p>

  <div class="device-wrap">
    <div class="device" id="device">

      <!-- ===== Class home (simplified) ===== -->
      <section class="screen ch" id="screen-class">
        <div class="ch-top">
          <div class="ch-ava">🧒</div>
          <div class="ch-hi">Hi, <b>Leo</b> — ready for today?</div>
        </div>
        <div class="ch-body">
          <aside class="ch-teacher">
            <div class="ch-teacher-face">👩‍🏫</div>
            <div class="ch-teacher-name">Kim</div>
            <button class="ch-teacher-sw">Change teacher</button>
          </aside>
          <main class="ch-main">
            <p class="ch-kicker">Start here first</p>
            <h2 class="ch-title">Today's lesson is ready</h2>
            <button class="ch-next" onclick="toast('进入上课 · Level 2 · Unit 1 · Lesson 2')">
              <span class="ch-next-thumb">👨‍👩‍👧</span>
              <span class="ch-next-info">
                <span class="ch-next-loc">Level 2 · Unit 1 · Lesson 2</span>
                <span class="ch-next-name">This is my family</span>
                <span class="ch-next-meta">~12 min · AI live class</span>
              </span>
              <span class="ch-next-go">Continue ▶</span>
            </button>
            <button class="ch-more" onclick="go('list')">More courses <span class="chev">›</span></button>
          </main>
        </div>
        <nav class="ch-nav">
          <button><span class="ic">🦖</span>Dino</button>
          <button class="on"><span class="ic">📚</span>Class</button>
          <button><span class="ic">🧭</span>Explore</button>
          <button><span class="ic">🎮</span>Play</button>
        </nav>
      </section>

      <!-- ===== Course List page (simplified directory) ===== -->
      <section class="screen cl active" id="screen-list">
        <div class="cl-shell">
          <div class="cl-head">
            <button class="cl-back" onclick="go('class')">← Class</button>
            <div class="lev-switch">
              <button class="lev-arrow" id="lev-prev" onclick="stepLevel(-1)" aria-label="Previous level">‹</button>
              <div class="lev-cur"><b id="lev-name">Level 2</b><span id="lev-meta">A1 · Level 2 of 6</span></div>
              <button class="lev-arrow" id="lev-next" onclick="stepLevel(1)" aria-label="Next level">›</button>
            </div>
            <span class="cl-prog" id="cl-prog">Unit 1 / 12</span>
          </div>
          <div class="cl-goal" id="cl-goal"></div>
          <div class="cl-scroll" id="cl-scroll">
            <div class="units" id="cl-units"></div>
          </div>
        </div>
      </section>

      <div class="toast" id="toast"></div>
    </div>
  </div>

<script>
/* ---------- data ---------- */
const LEVELS = [
  {n:1, cefr:'Pre-A1', state:'done'},
  {n:2, cefr:'A1',     state:'current'},
  {n:3, cefr:'A2',     state:'far'},
  {n:4, cefr:'A2+',    state:'far'},
  {n:5, cefr:'B1',     state:'far'},
  {n:6, cefr:'B1+',    state:'far'},
];
const ENDPOINTS = {
  1:'学完 Level 1 → 会打招呼、说出身边的人和东西',
  2:'学完 Level 2 → 能用完整句子聊家庭、食物和学校',
  3:'学完 Level 3 → 能描述日常、讲简单的小故事',
  4:'学完 Level 4 → 能表达看法、应付简单对话',
  5:'学完 Level 5 → 能解释想法、轻松聊天',
  6:'学完 Level 6 → 能自信地讨论大多数话题',
};
const THEMES = ['Greetings & Me','My Family','Animals','Food I Like','Colors & Numbers','My Day','At School','Weather & Seasons','Hobbies & Play','Places We Go','Feelings','Review & Show'];
const GOALS = ['打招呼、自我介绍','聊聊你的家人','认识动物和宠物','点餐、聊食物','数数、描述东西','说说每天做什么','聊学校生活','描述天气','分享喜欢做的事','问路、说地点','表达感受','把学过的串起来'];
const L1 = ['Hello! What\u2019s your name?','This is my family','Mom, Dad & me','I love my family'];

let curLevel = 2;          // the level the learner is in
let viewLevel = 2;         // the level shown on screen
const openUnits = new Set();   // default: all collapsed → first screen is a clean 12-unit directory

function units(level){
  const arr=[];
  for(let i=1;i<=12;i++){
    let state;
    if(level<curLevel) state='done';
    else if(level>curLevel) state='far';
    else state = i===1 ? 'current' : (i<=3 ? 'soon' : 'far');
    arr.push({n:i, theme:THEMES[i-1], goal:GOALS[i-1], state});
  }
  return arr;
}

/* ---------- render ---------- */
function lessonRows(u){
  const real = (viewLevel===curLevel && u.n===1);  // current unit shows real lesson states
  let rows='';
  for(let i=1;i<=12;i++){
    let cls='lock', ic='\u{1F512}', title=`Lesson ${i}`;
    if(real){
      title = i<=4 ? L1[i-1] : `Lesson ${i}`;
      if(i===1){cls='done';ic='\u2713';}
      else if(i===2){cls='current';ic='\u25B6';}
      else if(i<=4){cls='';ic=i;}
    } else if(u.state==='done'){cls='done';ic='\u2713';}
    rows += `<div class="ul ${cls}"><i>${ic}</i>${title}</div>`;
  }
  return rows;
}

function renderUnits(){
  const us = units(viewLevel);
  document.getElementById('cl-units').innerHTML = us.map(u=>{
    const stCls = {done:'st-done',current:'st-current',soon:'st-soon',far:'st-far'}[u.state];
    const stTxt = {done:'Done',current:'In progress',soon:'Opens soon',far:'Later'}[u.state];
    const cardCls = u.state==='done'?'done':(u.state==='current'?'current':'');
    const noIco = u.state==='done'?'\u2713':u.n;
    const open = openUnits.has(u.n)?'open':'';
    return `<div class="ucard ${cardCls} ${open}" data-u="${u.n}" onclick="toggleUnit(${u.n})">
      <div class="uc-top">
        <span class="uc-no">${noIco}</span>
        <span class="uc-info"><span class="uc-theme">Unit ${u.n} · ${u.theme}</span><span class="uc-goal">${u.goal}</span></span>
        <span class="uc-status ${stCls}">${stTxt}</span>
        <span class="uc-chev">\u203A</span>
      </div>
      <div class="uc-lessons">${lessonRows(u)}</div>
    </div>`;
  }).join('');
  const L = LEVELS[viewLevel-1];
  document.getElementById('lev-name').textContent = `Level ${viewLevel}`;
  document.getElementById('lev-meta').textContent = `${L.cefr} · Level ${viewLevel} of 6`;
  document.getElementById('lev-prev').disabled = viewLevel<=1;
  document.getElementById('lev-next').disabled = viewLevel>=6;
  document.getElementById('cl-prog').textContent = viewLevel<curLevel ? 'Completed' : (viewLevel>curLevel ? 'Coming up' : 'Unit 1 / 12');
  document.getElementById('cl-goal').innerHTML = `\u{1F3AF} ${ENDPOINTS[viewLevel]}`;
}

/* ---------- interactions ---------- */
function stepLevel(d){ const n=viewLevel+d; if(n<1||n>6) return; viewLevel=n; openUnits.clear(); const s=document.getElementById('cl-scroll'); if(s) s.scrollTop=0; renderUnits(); }
function toggleUnit(n){ if(openUnits.has(n)) openUnits.delete(n); else openUnits.add(n); renderUnits(); }
function go(which){
  document.getElementById('screen-class').classList.toggle('active', which==='class');
  document.getElementById('screen-list').classList.toggle('active', which==='list');
}
let tT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('on'),1800); }

renderUnits();
if(location.hash==='#class') go('class');
</script>
</body>
</html>
