<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UXCam 文档入口</title>
  <style>
    :root { font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; color: #111827; }
    body { max-width: 40rem; margin: 2rem auto; padding: 0 1.25rem; line-height: 1.6; }
    h1 { font-size: 1.35rem; margin-bottom: 0.5rem; }
    .note { font-size: 0.9rem; color: #6b7280; margin-bottom: 1.75rem; }
    section { margin-bottom: 1.75rem; padding: 1rem 1.1rem; border: 1px solid #e5e7eb; border-radius: 10px; background: #fafafa; }
    h2 { font-size: 1rem; margin: 0 0 0.5rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
    a.open { color: #1d4ed8; font-weight: 600; }
    .url { font-family: ui-monospace, monospace; font-size: 0.82rem; word-break: break-all; color: #374151; background: #fff; padding: 0.5rem 0.6rem; border-radius: 6px; border: 1px solid #e5e7eb; margin-top: 0.35rem; }
    button {
      font: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer;
      padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; color: #374151;
    }
    button:hover { background: #f3f4f6; }
    button.copied { border-color: #86efac; background: #ecfdf5; color: #065f46; }
  </style>
</head>
<body>
  <h1>UXCam 文档入口</h1>
  <p class="note">GitHub 不会在文件页生成「Pages 完整链接」，本站根目录即下方自动算出的地址；可复制链接发给同事，或点「打开」直接访问。</p>

  <section>
    <h2>操作教程（产品分析）</h2>
    <p><a class="open" href="uxcam-product-analytics-tutorial.html">打开页面 →</a></p>
    <div class="url" id="url-tutorial" aria-label="教程 Pages 链接"></div>
    <div class="actions"><button type="button" data-copy="url-tutorial">复制链接</button></div>
  </section>

  <section>
    <h2>数据洞察与优化建议</h2>
    <p><a class="open" href="uxcam-insights-report.html">打开页面 →</a></p>
    <div class="url" id="url-insights" aria-label="洞察报告 Pages 链接"></div>
    <div class="actions"><button type="button" data-copy="url-insights">复制链接</button></div>
  </section>

  <script>
    (function () {
      var base = new URL(".", location.href).href;
      var t = document.getElementById("url-tutorial");
      var i = document.getElementById("url-insights");
      if (t) t.textContent = base + "uxcam-product-analytics-tutorial.html";
      if (i) i.textContent = base + "uxcam-insights-report.html";

      document.querySelectorAll("[data-copy]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var id = btn.getAttribute("data-copy");
          var el = document.getElementById(id);
          if (!el) return;
          var text = el.textContent;
          function ok() {
            btn.textContent = "已复制";
            btn.classList.add("copied");
            setTimeout(function () {
              btn.textContent = "复制链接";
              btn.classList.remove("copied");
            }, 2000);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(ok).catch(function () {
              window.prompt("请手动复制：", text);
            });
          } else {
            window.prompt("请手动复制：", text);
          }
        });
      });
    })();
  </script>
</body>
</html>
